<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>(주)로컬브레인 구글 로그인 테스트</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="text-align: center; padding-top: 100px; background-color: #f4f6f9; font-family: sans-serif;">
    <h2>🤖 Brainfax 구글 소셜 로그인 실전 격발</h2>
    <p style="color: #666;">버튼을 누르면 구글 인증 후 자동으로 장부가 개설됩니다.</p>
    <br>
    <button onclick="login()" style="padding: 15px 30px; font-size: 18px; font-weight: bold; background-color: #4285F4; color: white; border: none; border-radius: 5px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
        Google 계정으로 0.1초 로그인
    </button>

    <script>
        // 1. 대장님의 Supabase 기지 주소와 공개 열쇠 장전
        const SUPABASE_URL = "https://zbwbhrxkopzcqiophkzo.supabase.co";
        
        // ⚠️ [필수 확인] 여기에 대장님의 진짜 anon public key 실탄을 복사해서 박아주셔야 합니다!
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpid2Jocnhrb3B6Y3Fpb3Boa3pvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5OTIyNjgsImV4cCI6MjA5NDU2ODI2OH0.UvkOJBX9KWyn4Of99pwd8-RpVqXAvR3B6Easjr0YLAM";
        // 2. 변수명 충돌을 원천 차단하기 위해 인스턴스명을 'sbClient'로 전격 분리!
        const sbClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function login() {
            console.log("구글 침투 개시...");
            const { data, error } = await sbClient.auth.signInWithOAuth({
                provider: 'google',
                options: {
                    // 로그인 성공 후 다시 이 바탕화면 파일 주소로 복귀시킵니다.
                    redirectTo: window.location.href 
                }
            });
            if (error) {
                console.error("침투 에러 발생:", error.message);
                alert("구글 침투 실패: " + error.message);
            }
        }
    </script>
</body>
</html>
